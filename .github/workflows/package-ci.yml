name: Package CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: package-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  package-ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: voidzero-dev/setup-vp@v1
        with:
          node-version: "24"
          cache: true
      - run: vp install
      - run: vp run -w build
      - run: vp run -w check
