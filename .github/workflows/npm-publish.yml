name: npm Publish

on:
  push:
    tags:
      - "v*.*.*"
  pull_request:
    branches:
      - main
    types:
      - closed
  workflow_dispatch:

permissions:
  contents: read

jobs:
  resolve-release:
    if: github.event_name != 'pull_request' || github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    outputs:
      release_enabled: ${{ steps.release.outputs.release_enabled }}
      release_reason: ${{ steps.release.outputs.release_reason }}
      release_type: ${{ steps.release.outputs.release_type }}
      tag: ${{ steps.release.outputs.tag }}
      version: ${{ steps.release.outputs.version }}
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ github.event_name == 'pull_request' && github.event.pull_request.merge_commit_sha || github.ref }}
      - uses: actions/setup-node@v6
        with:
          node-version: "24"
      - name: Resolve npm release
        id: release
        run: node scripts/release/resolve-npm-release.mjs

  build-pack:
    needs: resolve-release
    if: needs.resolve-release.outputs.release_enabled == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ github.event_name == 'pull_request' && github.event.pull_request.merge_commit_sha || github.ref }}
      - uses: voidzero-dev/setup-vp@v1
        with:
          node-version: "24"
          cache: true
      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"
      - run: npm install -g npm@11.18.0
      - run: vp install
      - run: vp run -w check
      - name: Pack packages
        run: |
          set -euo pipefail
          mkdir -p npm-artifacts
          for package_dir in packages/protocol packages/crypto packages/cli packages/mcp; do
            package_name="@agent-notifier/${package_dir#packages/}"
            vp run "$package_name#build"
            vp pm pack --filter "$package_name" --json --pack-destination "$GITHUB_WORKSPACE/npm-artifacts"
          done
      - name: Validate packed release versions
        if: needs.resolve-release.outputs.release_enabled == 'true'
        env:
          RELEASE_VERSION: ${{ needs.resolve-release.outputs.version }}
        run: |
          set -euo pipefail
          for artifact in npm-artifacts/*.tgz; do
            case "$artifact" in
              *-"$RELEASE_VERSION".tgz) ;;
              *) echo "Artifact $artifact does not match v$RELEASE_VERSION"; exit 1 ;;
            esac
          done
      - name: Dry-run package publish
        if: github.event_name == 'workflow_dispatch'
        run: |
          set -euo pipefail
          for package_name in agent-notifier-protocol agent-notifier-crypto agent-notifier-cli agent-notifier-mcp; do
            tgz="$(ls "npm-artifacts/${package_name}-"*.tgz | head -n 1)"
            npm publish "$tgz" --access public --dry-run --ignore-scripts
          done
      - uses: actions/upload-artifact@v4
        if: needs.resolve-release.outputs.release_enabled == 'true'
        with:
          name: npm-artifacts
          path: npm-artifacts/*.tgz
          retention-days: 7

  stage:
    needs:
      - resolve-release
      - build-pack
    if: needs.resolve-release.outputs.release_enabled == 'true'
    runs-on: ubuntu-latest
    environment: npm-publish
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"
      - run: npm install -g npm@11.18.0
      - uses: actions/download-artifact@v4
        with:
          name: npm-artifacts
          path: npm-artifacts
      - name: Stage packages
        env:
          RELEASE_VERSION: ${{ needs.resolve-release.outputs.version }}
        run: |
          set -euo pipefail
          for artifact in npm-artifacts/*.tgz; do
            case "$artifact" in
              *-"$RELEASE_VERSION".tgz) ;;
              *) echo "Artifact $artifact does not match v$RELEASE_VERSION"; exit 1 ;;
            esac
          done
          for package_name in agent-notifier-protocol agent-notifier-crypto agent-notifier-cli agent-notifier-mcp; do
            tgz="$(ls "npm-artifacts/${package_name}-"*.tgz | head -n 1)"
            npm stage publish "$tgz" --access public --provenance --ignore-scripts
          done
