name: npm Publish

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-pack:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: voidzero-dev/setup-vp@v1
        with:
          node-version: "24"
          cache: true
      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"
      - run: npm install -g npm@11.18.0
      - run: vp install
      - name: Validate release tag
        if: github.event_name == 'push'
        run: |
          node -e "const fs=require('node:fs'); const version=process.env.GITHUB_REF_NAME.replace(/^v/,''); for (const file of ['package.json','packages/protocol/package.json','packages/crypto/package.json','packages/cli/package.json','packages/mcp/package.json']) { const manifest=JSON.parse(fs.readFileSync(file,'utf8')); if (manifest.version !== version) throw new Error(`${file} version ${manifest.version} does not match tag v${version}`); }"
      - run: vp run -w check
      - name: Pack packages
        run: |
          set -euo pipefail
          mkdir -p npm-artifacts
          for package_dir in packages/protocol packages/crypto packages/cli packages/mcp; do
            package_name="@agent-notifier/${package_dir#packages/}"
            vp run "$package_name#build"
            vp pm pack --filter "$package_name" --json --pack-destination "$GITHUB_WORKSPACE/npm-artifacts"
          done
      - name: Dry-run package publish
        if: github.event_name == 'workflow_dispatch'
        run: |
          set -euo pipefail
          for package_name in agent-notifier-protocol agent-notifier-crypto agent-notifier-cli agent-notifier-mcp; do
            tgz="$(ls "npm-artifacts/${package_name}-"*.tgz | head -n 1)"
            npm publish "$tgz" --access public --dry-run --ignore-scripts
          done
      - uses: actions/upload-artifact@v4
        if: github.event_name == 'push'
        with:
          name: npm-artifacts
          path: npm-artifacts/*.tgz
          retention-days: 7

  stage:
    needs: build-pack
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    environment: npm-publish
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"
      - run: npm install -g npm@11.18.0
      - uses: actions/download-artifact@v4
        with:
          name: npm-artifacts
          path: npm-artifacts
      - name: Stage packages
        run: |
          set -euo pipefail
          version="${GITHUB_REF_NAME#v}"
          for artifact in npm-artifacts/*.tgz; do
            case "$artifact" in
              *-"$version".tgz) ;;
              *) echo "Artifact $artifact does not match tag v$version"; exit 1 ;;
            esac
          done
          for package_name in agent-notifier-protocol agent-notifier-crypto agent-notifier-cli agent-notifier-mcp; do
            tgz="$(ls "npm-artifacts/${package_name}-"*.tgz | head -n 1)"
            npm stage publish "$tgz" --access public --provenance --ignore-scripts
          done
